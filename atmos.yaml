# CLI config is loaded from the following locations (from lowest to highest priority):
# system dir (`/usr/local/etc/atmos` on Linux, `%LOCALAPPDATA%/atmos` on Windows)
# home dir (~/.atmos)
# current directory
# ENV vars
# Command-line arguments
#
# It supports POSIX-style Globs for file names/paths (double-star `**` is supported)
# https://en.wikipedia.org/wiki/Glob_(programming)

# Base path for components, stacks and workflows configurations.
# Can also be set using `ATMOS_BASE_PATH` ENV var, or `--base-path` command-line argument.
# Supports both absolute and relative paths.
# If not provided or is an empty string, `components.terraform.base_path`, `components.helmfile.base_path`, `stacks.base_path` and `workflows.base_path`
# are independent settings (supporting both absolute and relative paths).
# If `base_path` is provided, `components.terraform.base_path`, `components.helmfile.base_path`, `stacks.base_path` and `workflows.base_path`
# are considered paths relative to `base_path`.
aliases:
  tofu: terraform

components:
  terraform:
    command: "tofu" # Use the `tofu` command when calling "terraform" in Atmos.
    base_path: "components/terraform"
    apply_auto_approve: false
    deploy_run_init: true
    init_run_reconfigure: true
    auto_generate_backend_file: true

stacks:
  base_path: "stacks"
  included_paths:
    - "orgs/**/*"
  excluded_paths:
    - "**/_defaults.yaml"
  name_template: "{{.tenant}}-{{.environment}}-{{.stage}}"

workflows:
  base_path: "stacks/workflows"

docs:
  generate:
    readme:
      base-dir: .
      template: ".github/README.md.gotmpl"
      output: ".github/README.md"
      terraform:
        enabled: false
      input:
        - "README.yaml"

# CI-specific settings (provider-agnostic naming)
ci:
  # Gate for CI auto-detection (bool, default false).
  # When false/unset: CI features only activate with --ci flag (or CI env var).
  # When true: CI features available via auto-detection even without --ci flag.
  # Note: --ci flag bypasses this setting. See ci-detection.md for full precedence table.
  enabled: true

  # Output variables for downstream jobs
  # GitHub: $GITHUB_OUTPUT, GitLab: dotenv artifacts
  output:
    enabled: true
    # Whitelist of native CI variables to export. When omitted, ALL native CI variables are exported.
    # NOTE: This whitelist only applies to native CI variables (has_changes, stack, etc.).
    # Terraform outputs (output_*) after successful apply are ALWAYS included regardless of this list.
    # variables:
    #   - has_changes
    #   - has_errors
    #   - exit_code
    #   - success
    #   - resources_to_create
    #   - resources_to_change
    #   - resources_to_replace
    #   - resources_to_destroy
    #   - stack
    #   - component
    #   - command
    #   - summary

  # Job summary with plan/apply results
  # GitHub: $GITHUB_STEP_SUMMARY, GitLab: job artifacts
  summary:
    enabled: true
    # template: "custom-summary.md"

  # Commit status checks
  # GitHub: Check Runs API, GitLab: Commit Status API
  checks:
    enabled: true  # Disabled by default (requires additional permissions)
    context_prefix: ""
    statuses:
      component: true
      add: true
      change: true
      destroy: true
    


# Templates are required to determine Atmos Pro apply environment dynamically
templates:
  settings:
    enabled: true
    gomplate:
      enabled: true
    sprig:
      enabled: true

# Disable telemetry for our internal usage
settings:
  telemetry:
    enabled: false

logs:
  verbose: false
  colors: true
  file: "/dev/stderr"
  # Supported log levels: Trace, Debug, Info, Warning, Off
  # Can also be set using `ATMOS_LOGS_LEVEL` ENV var, or `--log-level` command-line argument
  level: Debug
