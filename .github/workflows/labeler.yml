name: Labeler

on:
  # pull_request_target is required here because the labeler needs write access to PRs
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ["ubuntu-latest"]
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yaml

